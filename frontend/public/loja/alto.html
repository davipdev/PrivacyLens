<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromoFácil — Cadastro premium</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f4f4f5; display: grid; place-items: center; min-height: 100vh; margin: 0; }
    form { background: #fff; padding: 2rem; border-radius: 8px; width: 320px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    h1 { font-size: 1.2rem; margin-top: 0; }
    label { display: block; font-size: .8rem; color: #555; margin: .8rem 0 .2rem; }
    input { width: 100%; padding: .6rem; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    button { margin-top: 1.2rem; width: 100%; padding: .7rem; background: #f59e0b; color: #fff; border: 0; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  
  <form>
    <h1>Cadastro Premium — PromoFácil</h1>
    <label>Nome</label>
    <input type="text" name="nome" placeholder="Seu nome" />
    <label>E-mail</label>
    <input type="email" name="email" placeholder="voce@email.com" />
    <label>Profissão</label>
    <input type="text" name="profissao" placeholder="Sua profissão" />
    <label>Renda mensal</label>
    <input type="text" name="rendamensal" placeholder="R$ 0,00" />
    <button type="submit">Quero as ofertas</button>
  </form>
</body>
</html>
